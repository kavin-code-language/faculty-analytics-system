<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Analytics — Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="{{ theme | default('theme-light') }}">

    <div class="auth-page" style="background: url('/static/images/login_bg.png') no-repeat center center / cover; color: var(--text); position: relative; overflow: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center;">

        <div class="auth-box"
            style="position: relative; z-index: 10; width: 420px; border-radius: 32px; background: var(--card); border: 1px solid var(--border); padding: 50px; box-shadow: 0 40px 100px rgba(0, 0, 0, 0.1);">

            <div style="text-align: center; margin-bottom: 40px;">
                <div
                    style="display: inline-flex; background: var(--accent); padding: 12px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 10L12 5L2 10L12 15L22 10Z" stroke="white" stroke-width="2" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M6 12V17C6 17 8.5 19 12 19C15.5 19 18 17 18 17V12" stroke="white" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </div>
                <h1
                    style="font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; color: var(--text); margin: 0; letter-spacing: -0.5px;">
                    Institutional Portal</h1>
                <p style="color: var(--muted); font-size: 14px; margin-top: 8px; font-weight: 500;">Faculty
                    Analytics & Evaluation</p>
            </div>

            {% if error %}
            <div
                style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171; padding: 14px; border-radius: 14px; font-size: 13px; margin-bottom: 25px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label
                        style="color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700;">Identity
                        ID</label>
                    <input type="text" name="username" placeholder="Enter your ID" required
                        style="background: var(--surface); border: 1px solid var(--border); color: var(--text); height: 55px; border-radius: 16px; padding: 0 20px; font-size: 15px; margin-top: 8px; width: 100%; outline: none; transition: all 0.2s ease;">
                </div>
                <div class="form-group" style="margin-bottom: 30px;">
                    <label
                        style="color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700;">Password</label>
                    <input type="password" name="password" placeholder="••••••••" required
                        style="background: var(--surface); border: 1px solid var(--border); color: var(--text); height: 55px; border-radius: 16px; padding: 0 20px; font-size: 15px; margin-top: 8px; width: 100%; outline: none; transition: all 0.2s ease;">
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; height: 58px; font-size: 16px; font-weight: 800; border-radius: 18px; background: var(--accent); color: white; border: none; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 15px 35px rgba(37, 99, 235, 0.25);">
                    Authorize Login
                </button>
            </form>

            <div style="margin-top: 40px; text-align: center;">
                <div style="width: 30px; height: 2px; background: rgba(255, 255, 255, 0.1); margin: 0 auto 15px;"></div>
                <p
                    style="font-size: 11px; color: rgba(255, 255, 255, 0.3); text-transform: uppercase; letter-spacing: 2px; font-weight: 600;">
                    Secure Institutional Access</p>
            </div>
        </div>
    </div>

    <style>
        .auth-page input:focus {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1) !important;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.35);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }
    </style>


</body>

</html>
